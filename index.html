<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ford Vehicle Production Explorer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <svg width="52" height="30" viewBox="0 0 52 30" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="26" cy="15" rx="25.5" ry="14.5" fill="#003499" stroke="#fff" stroke-width="1.2"/>
    <text x="26" y="20" text-anchor="middle"
          font-family="'Times New Roman', serif" font-style="italic"
          font-size="14" font-weight="bold" fill="white" letter-spacing="0.5">Ford</text>
  </svg>
  <div>
    <h1>Ford Vehicle Production Explorer</h1>
    <div class="subtitle">Calendar Year Production by Vehicle · 2021 – 2026</div>
  </div>
</header>

<!-- ── Tab bar ────────────────────────────────────────────────────────── -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="explorer">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <rect x="2" y="14" width="4" height="8"/><rect x="9" y="9" width="4" height="13"/>
      <rect x="16" y="4" width="4" height="18"/>
    </svg>
    Production Explorer
  </button>
  <button class="tab-btn" data-tab="plantmap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </svg>
    Plant Map
  </button>
</nav>

<!-- ══════════════════════════════════════════════════════════════════════
     TAB 1 — Production Explorer
     ══════════════════════════════════════════════════════════════════════ -->
<div id="tab-explorer" class="tab-content active">
  <div class="page-wrap">

    <div class="controls">
      <!-- Year pills -->
      <div class="ctrl-group ctrl-years">
        <label>Year <span class="label-hint">(select one or more)</span></label>
        <div class="year-pills" id="year-pills"></div>
      </div>
      <!-- Row 2 -->
      <div class="ctrl-row2">
        <div class="ctrl-group">
          <label for="sel-vehicle">Vehicle</label>
          <select id="sel-vehicle"><option value="all">All Vehicles</option></select>
        </div>
        <div class="ctrl-group">
          <label for="sel-month">Month</label>
          <select id="sel-month"><option value="all">Full Year</option></select>
        </div>
        <div class="ctrl-group ctrl-search">
          <label for="inp-search">Search</label>
          <input type="text" id="inp-search" placeholder="e.g. Bronco, F-150…" />
        </div>
        <div class="view-toggle">
          <button id="btn-chart" class="active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <rect x="2" y="14" width="4" height="8"/><rect x="9" y="9" width="4" height="13"/>
              <rect x="16" y="4" width="4" height="18"/>
            </svg>
            Chart
          </button>
          <button id="btn-table">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/>
              <line x1="9" y1="9" x2="9" y2="21"/>
            </svg>
            Table
          </button>
        </div>
      </div>
    </div>

    <div id="app-root"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     TAB 2 — Plant Map
     ══════════════════════════════════════════════════════════════════════ -->
<div id="tab-plantmap" class="tab-content">
  <div class="map-layout">
    <div id="plant-map"></div>
    <aside class="plant-panel" id="plant-panel">
      <div class="plant-panel-loading">Loading…</div>
    </aside>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/plantmap.js"></script>
</body>
</html>
