<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ford Vehicle Data Explorer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <!-- Ford oval logo (SVG) -->
  <svg width="52" height="30" viewBox="0 0 52 30" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="26" cy="15" rx="25.5" ry="14.5" fill="#003499" stroke="#fff" stroke-width="1.2"/>
    <text x="26" y="20" text-anchor="middle"
          font-family="'Times New Roman', serif" font-style="italic"
          font-size="14" font-weight="bold" fill="white" letter-spacing="0.5">Ford</text>
  </svg>
  <div>
    <h1>Ford Vehicle Data Explorer</h1>
    <div class="subtitle">Production &amp; U.S. Retail Sales · 2021 – 2026</div>
  </div>
</header>

<!-- ── Controls ───────────────────────────────────────────────────────── -->
<div class="page-wrap">
  <div class="controls">

    <!-- Data Type -->
    <div class="ctrl-group">
      <label for="sel-datatype">Data Type</label>
      <select id="sel-datatype">
        <option value="production">Production</option>
        <option value="retail_sales">U.S. Retail Sales</option>
      </select>
    </div>

    <!-- Year -->
    <div class="ctrl-group">
      <label for="sel-year">Year</label>
      <select id="sel-year"></select>
    </div>

    <!-- Vehicle -->
    <div class="ctrl-group">
      <label for="sel-vehicle">Vehicle</label>
      <select id="sel-vehicle">
        <option value="all">All Vehicles</option>
      </select>
    </div>

    <!-- Month (production only) -->
    <div class="ctrl-group">
      <label for="sel-month">Month</label>
      <select id="sel-month">
        <option value="all">Full Year</option>
      </select>
    </div>

    <!-- Search -->
    <div class="ctrl-group search">
      <label for="inp-search">Search Vehicle</label>
      <input type="text" id="inp-search" placeholder="e.g. Bronco, F-150…" />
    </div>

    <!-- View toggle -->
    <div class="view-toggle">
      <button id="btn-chart" class="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="2" y="14" width="4" height="8"/><rect x="9" y="9" width="4" height="13"/>
          <rect x="16" y="4" width="4" height="18"/>
        </svg>
        Chart
      </button>
      <button id="btn-table">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        Table
      </button>
    </div>

  </div><!-- /controls -->

  <!-- ── Dynamic content injected here ── -->
  <div id="app-root"></div>

</div><!-- /page-wrap -->

<script src="js/app.js"></script>
</body>
</html>
